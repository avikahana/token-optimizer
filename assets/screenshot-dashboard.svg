  <text x="100" y="193" font-family="Menlo, SFMono-Regular, monospace" font-size="22" fill="#22d3ee">$ token-optimizer audit --project . --json</text>
  <text x="100" y="216" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#a8b3c7">Read-only scan. Explicit project path. No transcript or tool-output capture.</text>
