  <rect x="702" y="75" width="190" height="34" rx="12" fill="#1f2a44" stroke="#3b4960"/><text x="716" y="98" font-family="Menlo, SFMono-Regular, monospace" font-size="16" fill="#dbe7ff">audit --project .</text>
