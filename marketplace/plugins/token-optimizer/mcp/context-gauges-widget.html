<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --panel: #ffffff;
        --text: #111827;
        --muted: #64748b;
        --line: #dbe3ef;
        --accent: #2563eb;
        --good: #10b981;
        --warn: #b45309;
        --warn-bg: #fff7ed;
        --danger: #dc2626;
        --danger-bg: #fef2f2;
        --info-bg: #eff6ff;
        --track: #e2e8f0;
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --panel: #111827;
          --text: #f8fafc;
          --muted: #94a3b8;
          --line: #263244;
          --accent: #60a5fa;
          --good: #34d399;
          --warn: #fbbf24;
          --warn-bg: #2a1f0c;
          --danger: #f87171;
          --danger-bg: #2a1215;
          --info-bg: #12233d;
          --track: #263244;
          --shadow: none;
        }
      }
      html.dark {
        --bg: #0f172a;
        --panel: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --line: #263244;
        --accent: #60a5fa;
        --good: #34d399;
        --warn: #fbbf24;
        --warn-bg: #2a1f0c;
        --danger: #f87171;
        --danger-bg: #2a1215;
        --info-bg: #12233d;
        --track: #263244;
        --shadow: none;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 780px;
        margin: 0 auto;
        padding: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }
      .muted { color: var(--muted); }
      .path {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        overflow-wrap: anywhere;
        color: var(--text);
      }
      .body { padding: 18px; display: grid; gap: 14px; }
      .section {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }
      .section h2 {
        margin: 0 0 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
      }
      .score-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .score-value { font-size: 22px; font-weight: 700; }
      .bar {
        height: 8px;
        border-radius: 999px;
        background: var(--track);
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: var(--good);
        transition: width 220ms ease;
      }
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }
      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .metric .label { font-size: 12px; color: var(--muted); }
      .metric .value { font-size: 20px; font-weight: 700; }
      .chips {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .chip {
        font-size: 12px;
        border-radius: 999px;
        padding: 4px 10px;
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .chip.warning { background: var(--warn-bg); color: var(--warn); border-color: transparent; }
      .chip.info { background: var(--info-bg); color: var(--accent); border-color: transparent; }
      .chip.danger { background: var(--danger-bg); color: var(--danger); border-color: transparent; }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: var(--accent);
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }
      .result { min-height: 20px; color: var(--muted); }
      @media (max-width: 720px) {
        main { padding: 12px; }
        .header { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <div class="header">
          <div>
            <h1>Token Optimizer Context Gauges</h1>
            <div class="muted">Read-only static audit gauges, recomputed on demand.</div>
          </div>
          <button id="refresh" type="button" disabled>Refresh</button>
        </div>
        <div class="body">
          <section class="section">
            <h2>Project</h2>
            <p class="path" id="projectPath">Waiting for project...</p>
          </section>
          <section class="section">
            <div class="score-row">
              <h2 style="margin: 0;">Project health score</h2>
              <span class="score-value" id="scoreValue">--</span>
            </div>
            <div class="bar"><div class="bar-fill" id="scoreBar"></div></div>
          </section>
          <div class="metrics">
            <div class="metric">
              <div class="label">Static token estimate</div>
              <div class="value" id="tokenEstimate">--</div>
              <div class="label" id="estimatorLabel"></div>
            </div>
            <div class="metric">
              <div class="label">Files scanned</div>
              <div class="value" id="scannedFiles">--</div>
            </div>
            <div class="metric">
              <div class="label">Outline candidates</div>
              <div class="value" id="outlineCandidates">--</div>
            </div>
          </div>
          <section class="section">
            <h2>Signals and state</h2>
            <div class="chips" id="chips"></div>
          </section>
          <div class="footer">
            <span class="muted" id="computedAt"></span>
            <span class="result" id="result"></span>
          </div>
        </div>
      </div>
    </main>
    <script type="module">
      const projectPathEl = document.querySelector("#projectPath");
      const scoreValueEl = document.querySelector("#scoreValue");
      const scoreBarEl = document.querySelector("#scoreBar");
      const tokenEstimateEl = document.querySelector("#tokenEstimate");
      const estimatorLabelEl = document.querySelector("#estimatorLabel");
      const scannedFilesEl = document.querySelector("#scannedFiles");
      const outlineCandidatesEl = document.querySelector("#outlineCandidates");
      const chipsEl = document.querySelector("#chips");
      const computedAtEl = document.querySelector("#computedAt");
      const refreshEl = document.querySelector("#refresh");
      const resultEl = document.querySelector("#result");

      let state = null;
      let rpcId = 0;
      const pendingRequests = new Map();

      const trustedParentOrigin = (() => {
        const ancestors = window.location.ancestorOrigins;
        if (ancestors && ancestors.length > 0) return ancestors[0];
        if (!document.referrer) return null;
        try {
          return new URL(document.referrer).origin;
        } catch {
          return null;
        }
      })();

      const postToParent = (message) => {
        if (!trustedParentOrigin) {
          throw new Error("Host bridge origin is unavailable.");
        }
        window.parent.postMessage(message, trustedParentOrigin);
      };

      const rpcNotify = (method, params) => {
        postToParent({ jsonrpc: "2.0", method, params });
      };

      const rpcRequest = (method, params) =>
        new Promise((resolve, reject) => {
          const id = ++rpcId;
          pendingRequests.set(id, { resolve, reject });
          try {
            postToParent({ jsonrpc: "2.0", id, method, params });
          } catch (error) {
            pendingRequests.delete(id);
            reject(error);
            return;
          }
          setTimeout(() => {
            if (pendingRequests.delete(id)) {
              reject(new Error("Host bridge did not respond."));
            }
          }, 8000);
        });

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent) return;
        if (!trustedParentOrigin || event.origin !== trustedParentOrigin) return;
        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;

        if (typeof message.id === "number") {
          const pending = pendingRequests.get(message.id);
          if (!pending) return;
          pendingRequests.delete(message.id);
          if (message.error) pending.reject(new Error(message.error.message ?? "Bridge call failed."));
          else pending.resolve(message.result);
          return;
        }

        if (message.method === "ui/notifications/tool-result") {
          hydrate(message.params?.structuredContent ?? null);
        }
      }, { passive: true });

      const initializeBridge = async () => {
        await rpcRequest("ui/initialize", {
          appInfo: { name: "token-optimizer-context-gauges", version: "0.2.0" },
          appCapabilities: {},
          protocolVersion: "2026-01-26",
        });
        rpcNotify("ui/notifications/initialized", {});
      };

      const bridgeReady = initializeBridge().catch((error) => {
        resultEl.textContent = error.message;
      });

      function hydrate(nextState) {
        if (!nextState || !nextState.gauges) return;
        state = nextState;
        render();
      }

      function chip(text, kind) {
        const span = document.createElement("span");
        span.className = kind ? `chip ${kind}` : "chip";
        span.textContent = text;
        return span;
      }

      function render() {
        if (!state) return;
        const gauges = state.gauges;
        projectPathEl.textContent = state.projectPath;
        scoreValueEl.textContent = `${gauges.score} / 100`;
        scoreBarEl.style.width = `${Math.max(0, Math.min(100, gauges.score))}%`;
        scoreBarEl.style.background =
          gauges.score >= 70 ? "var(--good)" : gauges.score >= 40 ? "var(--warn)" : "var(--danger)";
        tokenEstimateEl.textContent = Number(gauges.staticTokenEstimate).toLocaleString("en-US");
        estimatorLabelEl.textContent = `${gauges.measurement}, ${gauges.estimator}`;
        scannedFilesEl.textContent = Number(gauges.scannedFiles).toLocaleString("en-US");
        outlineCandidatesEl.textContent = String(gauges.outlineCandidateCount);
        chipsEl.replaceChildren();
        const counts = gauges.signalCounts ?? {};
        const severities = Object.keys(counts).sort();
        let anySignal = false;
        for (const severity of severities) {
          if (!counts[severity]) continue;
          anySignal = true;
          chipsEl.append(
            chip(`${counts[severity]} ${severity}`, severity === "warning" ? "warning" : "info"),
          );
        }
        if (!anySignal) {
          chipsEl.append(chip("no signals"));
        }
        chipsEl.append(
          chip(
            gauges.managedHooksPresent ? "managed hook entry present" : "no managed hook entry",
            gauges.managedHooksPresent ? "info" : undefined,
          ),
        );
        computedAtEl.textContent = state.computedAt ? `Computed ${state.computedAt}` : "";
        refreshEl.disabled = false;
      }

      async function callTool(name, args) {
        if (window.openai?.callTool) {
          return window.openai.callTool(name, args);
        }
        await bridgeReady;
        return rpcRequest("tools/call", { name, arguments: args });
      }

      refreshEl.addEventListener("click", async () => {
        if (!state) return;
        refreshEl.disabled = true;
        resultEl.textContent = "Recomputing...";
        try {
          const response = await callTool("token_optimizer_context_gauges", {
            projectPath: state.projectPath,
          });
          hydrate(response?.structuredContent ?? response);
          resultEl.textContent = "";
        } catch (error) {
          resultEl.textContent = error instanceof Error ? error.message : String(error);
          refreshEl.disabled = false;
        }
      });

      hydrate(window.openai?.toolOutput ?? null);
    </script>
  </body>
</html>
