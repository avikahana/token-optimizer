  <text x="856" y="508" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#f8fafc">1 Inspect</text><text x="904" y="530" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#a8b3c7">doctor / audit</text>
  <text x="856" y="544" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#f8fafc">2 Shape</text><text x="904" y="566" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#a8b3c7">outline / summarize</text>
  <text x="856" y="580" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#f8fafc">3 Verify</text><text x="904" y="602" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#a8b3c7">benchmark fixture</text>
