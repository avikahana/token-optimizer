    <rect x="72" y="266" width="350" height="132" rx="18" fill="#172033" stroke="#2c3a52"/><text x="166" y="312" font-size="18" fill="#a8b3c7">Context score</text><text x="166" y="348" font-size="34" font-weight="700" fill="#f8fafc">86 / 100</text><text x="96" y="371" font-size="16" fill="#a8b3c7">Signals are visible before you hand off.</text>
